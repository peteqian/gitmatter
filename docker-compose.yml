# Self-host stack. For development you typically only run `docker compose up -d
# postgres` and `bun run dev`; this full compose runs the whole system.
#
#   docker compose up --build
#
# docling-serve has no authentication, so it is NOT published to the host — it
# is only reachable on the internal compose network.
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: gitcounsel
      POSTGRES_PASSWORD: gitcounsel
      POSTGRES_DB: gitcounsel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitcounsel"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Docling document parser as a sidecar. No auth -> internal network only.
  # Pinned (not :latest) so a restart can't silently pull a different version;
  # override DOCLING_IMAGE to bump.
  docling:
    image: ${DOCLING_IMAGE:-quay.io/docling-project/docling-serve-cpu:v1.24.0}
    expose:
      - "5001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c "import urllib.request; urllib.request.urlopen(''http://localhost:5001/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # One-shot schema migration. Runs to completion before web starts; keeps the
  # serving container immutable (no schema mutation at app boot).
  migrate:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.web
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://gitcounsel:gitcounsel@postgres:5432/gitcounsel
    command: ["sh", "-c", "cd /app/packages/db && bun run migrate"]
    restart: "no"

  web:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.web
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      docling:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://gitcounsel:gitcounsel@postgres:5432/gitcounsel
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4280}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set in .env}
      COURTLISTENER_API_TOKEN: ${COURTLISTENER_API_TOKEN:-}
      DOCLING_URL: http://docling:5001/v1/convert/source
      PORT: "4280"
    ports:
      - "4280:4280"

volumes:
  pgdata:
