# Copy-paste self-host stack. Pulls the prebuilt web image (no build from source)
# alongside bundled Postgres + Docling, runs the schema migration once, then serves
# the app on http://localhost:4280.
#
#   cp .env.example .env       # then fill BETTER_AUTH_SECRET, ENCRYPTION_KEY, S3_*
#   docker compose -f docker-compose.local.yml up -d
#
# Storage is bring-your-own: the app requires an S3-compatible bucket (Cloudflare
# R2, AWS S3, MinIO, …) — set the S3_* vars in .env. Docling has no auth, so it is
# NOT published to the host; it is only reachable on the internal compose network.
# Override the web image with GITCOUNSEL_IMAGE to pin a version.
services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: gitcounsel
      POSTGRES_PASSWORD: gitcounsel
      POSTGRES_DB: gitcounsel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitcounsel"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Docling document parser. Pinned (not :latest); override DOCLING_IMAGE to bump.
  docling:
    image: ${DOCLING_IMAGE:-quay.io/docling-project/docling-serve-cpu:v1.24.0}
    restart: unless-stopped
    expose:
      - "5001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c "import urllib.request; urllib.request.urlopen(''http://localhost:5001/health'')"',
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # One-shot schema migration. Runs to completion before web starts; keeps the
  # serving container immutable (no schema mutation at app boot).
  migrate:
    image: ${GITCOUNSEL_IMAGE:-ghcr.io/peteqian/gitcounsel:latest}
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://gitcounsel:gitcounsel@postgres:5432/gitcounsel
    command: ["sh", "-c", "cd /app/packages/db && bun run migrate"]

  web:
    image: ${GITCOUNSEL_IMAGE:-ghcr.io/peteqian/gitcounsel:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      docling:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://gitcounsel:gitcounsel@postgres:5432/gitcounsel
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4280}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set in .env}
      # S3-compatible object storage (required — no local fallback).
      S3_ENDPOINT: ${S3_ENDPOINT:?set in .env}
      S3_REGION: ${S3_REGION:-auto}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?set in .env}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?set in .env}
      S3_BUCKET: ${S3_BUCKET:-gitcounsel}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      COURTLISTENER_API_TOKEN: ${COURTLISTENER_API_TOKEN:-}
      DOCLING_URL: http://docling:5001/v1/convert/source
      PORT: "4280"
    ports:
      - "4280:4280"

volumes:
  pgdata:
