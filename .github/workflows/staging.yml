name: Staging

# dev branch → staging. Verify, build the cloud image as gitmatter-cloud:staging
# (private package), push to GHCR, then ping the staging VPS redeploy webhook.
on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: staging
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      # Build the web app into apps/web/dist here (not in the Docker build): the
      # cloud prerender boots the SSR server and crawls it, which needs a real
      # environment. The dummy DATABASE_URL only satisfies the db client's import
      # guard — public pages never query it.
      - name: Build web (cloud)
        env:
          DEPLOYMENT: cloud
          # Dummy build-only values: vp build forces NODE_ENV=production, so the
          # prerender server boots the real auth/db modules. DATABASE_URL only
          # satisfies the db client's import guard (public pages never query it);
          # BETTER_AUTH_SECRET only clears better-auth's default-secret check.
          DATABASE_URL: postgres://build:build@127.0.0.1:5432/build
          BETTER_AUTH_SECRET: build-only-not-a-real-secret-000000
        run: cd apps/web && bun run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Cloud flavor → private gitmatter-cloud package. Mutable :staging plus
          # a per-commit :staging-<sha> for traceability.
          images: ghcr.io/${{ github.repository }}-cloud
          flavor: |
            latest=false
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cloud
          cache-to: type=gha,mode=max,scope=cloud

      # Staging runs as a Docker-image app in dokploy, so we trigger a redeploy via
      # the dokploy API (application.deploy with x-api-key) rather than a git
      # webhook. dokploy then pulls the freshly pushed :staging image and restarts.
      - name: Trigger staging redeploy
        env:
          DOKPLOY_URL: ${{ secrets.STAGING_DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.STAGING_DOKPLOY_API_KEY }}
          APP_ID: ${{ secrets.STAGING_DOKPLOY_APP_ID }}
        run: |
          if [ -z "$DOKPLOY_URL" ]; then
            echo "STAGING_DOKPLOY_URL unset — skipping deploy."
            exit 0
          fi
          curl -fsSL -X POST "$DOKPLOY_URL/api/application.deploy" \
            -H "x-api-key: $DOKPLOY_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"applicationId\":\"$APP_ID\"}"
