name: Staging

# dev branch → staging. Verify, build the cloud image as gitmatter-cloud:staging
# (private package), push to GHCR, then ping the staging VPS redeploy webhook.
on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: staging
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      # Build the web app into apps/web/dist here (not in the Docker build): the
      # cloud prerender boots the SSR server and crawls it, which needs a real
      # environment. The dummy DATABASE_URL only satisfies the db client's import
      # guard — public pages never query it.
      - name: Build web (cloud)
        env:
          DEPLOYMENT: cloud
          # Dummy build-only values: vp build forces NODE_ENV=production, so the
          # prerender server boots the real auth/db modules. DATABASE_URL only
          # satisfies the db client's import guard (public pages never query it);
          # BETTER_AUTH_SECRET only clears better-auth's default-secret check.
          DATABASE_URL: postgres://build:build@127.0.0.1:5432/build
          BETTER_AUTH_SECRET: build-only-not-a-real-secret-000000
          # Public Turnstile site key for staging.gitmatter.com — baked into the
          # client bundle here (vite define). Public by design (ships to every
          # browser), so it lives in the workflow, not a secret. The matching
          # TURNSTILE_SECRET_KEY is set as runtime env on the dokploy app.
          TURNSTILE_SITE_KEY: "0x4AAAAAADoWezFOHdsCDIF-"
        run: cd apps/web && bun run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Cloud flavor → private gitmatter-cloud package. Mutable :staging plus
          # a per-commit :staging-<sha> for traceability.
          images: ghcr.io/${{ github.repository }}-cloud
          flavor: |
            latest=false
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SENTRY_RELEASE=${{ github.sha }}
          cache-from: type=gha,scope=cloud
          cache-to: type=gha,mode=max,scope=cloud

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # Dokploy per-app deploy webhook (token in the URL, no api-key). Replaces the
      # /api/application.deploy + x-api-key call, which 403'd after the API key was
      # rotated. The webhook URL is the app's refresh-token endpoint.
      - name: Trigger staging redeploy
        env:
          WEBHOOK: ${{ secrets.STAGING_DOKPLOY_WEB_WEBHOOK }}
          DOKPLOY_HOST: dokploy.gitmatter.com
          DOKPLOY_TAILNET_IP: 100.68.201.48
        run: |
          echo "::add-mask::$WEBHOOK"
          WEBHOOK_HOST="${WEBHOOK#*://}"
          WEBHOOK_HOST="${WEBHOOK_HOST%%/*}"
          WEBHOOK_HOST_ONLY="${WEBHOOK_HOST%%:*}"
          WEBHOOK_PATH="/${WEBHOOK#*://*/}"
          WEBHOOK_URL="https://${DOKPLOY_HOST}${WEBHOOK_PATH}"
          echo "::add-mask::$WEBHOOK_HOST"
          echo "::add-mask::$WEBHOOK_HOST_ONLY"
          echo "::add-mask::$WEBHOOK_URL"
          DEPLOY_TITLE_PREFIX="Staging web"
          SHORT_SHA="${GITHUB_SHA::7}"
          SHORT_SHA="${SHORT_SHA:-unknown}"
          SUBJECT="Manual deploy"
          if [ -f "${GITHUB_EVENT_PATH:-}" ]; then
            SUBJECT="$(jq -r '(.head_commit.message // "") | split("\n")[0]' "$GITHUB_EVENT_PATH")"
            SUBJECT="${SUBJECT:-Manual deploy}"
          fi
          DEPLOY_TITLE="${DEPLOY_TITLE_PREFIX}: ${SHORT_SHA} - ${SUBJECT}"
          if [ -f "${GITHUB_EVENT_PATH:-}" ]; then
            PAYLOAD="$(jq -c \
              --arg ref "refs/heads/${GITHUB_REF_NAME:-}" \
              --arg sha "${GITHUB_SHA:-}" \
              --arg title "$DEPLOY_TITLE" \
              '.ref = (.ref // $ref)
              | .head_commit = ((.head_commit // {}) + { id: (.head_commit.id // $sha), message: $title })
              | .commits = (if (.commits | type) == "array" then .commits else [] end)' \
              "$GITHUB_EVENT_PATH")"
          else
            PAYLOAD="$(jq -cn \
              --arg ref "refs/heads/${GITHUB_REF_NAME:-}" \
              --arg sha "${GITHUB_SHA:-}" \
              --arg title "$DEPLOY_TITLE" \
              '{ ref: $ref, head_commit: { id: $sha, message: $title }, commits: [] }')"
          fi
          curl --resolve "$DOKPLOY_HOST:443:$DOKPLOY_TAILNET_IP" --connect-timeout 10 --retry 2 --retry-delay 5 -fsSL -X POST -H "Content-Type: application/json" -H "x-github-event: push" -d "$PAYLOAD" "$WEBHOOK_URL"

  # Docs is a standalone Next.js app served under /docs. It builds and ships
  # independently of the web image: next build on the runner produces a
  # self-contained standalone bundle, packaged by Dockerfile.docs (context is the
  # standalone dir) and pushed as the private gitmatter-docs package. A separate
  # dokploy Application pulls it; Traefik routes /docs to it on the same host.
  deploy-docs:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      # next build → standalone server output; postbuild copies .next/static and
      # the repo-root docs/ content into the standalone bundle.
      - name: Build docs
        run: cd apps/docs && bun run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-docs
          flavor: |
            latest=false
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Context is the standalone bundle so the repo .dockerignore (strips
          # **/node_modules) doesn't drop the server's traced deps.
          context: apps/docs/.next/standalone
          file: infrastructure/Dockerfile.docs
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docs
          cache-to: type=gha,mode=max,scope=docs

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Trigger staging docs redeploy
        env:
          WEBHOOK: ${{ secrets.STAGING_DOKPLOY_DOCS_WEBHOOK }}
          DOKPLOY_HOST: dokploy.gitmatter.com
          DOKPLOY_TAILNET_IP: 100.68.201.48
        run: |
          # The docs image is pushed above regardless. The redeploy only fires once
          # STAGING_DOKPLOY_DOCS_WEBHOOK (the docs app's deploy webhook URL) is set —
          # until then, skip (don't fail the whole staging run, which also deploys web).
          if [ -z "$WEBHOOK" ]; then
            echo "STAGING_DOKPLOY_DOCS_WEBHOOK not set — docs image pushed, skipping redeploy."
            exit 0
          fi
          echo "::add-mask::$WEBHOOK"
          WEBHOOK_HOST="${WEBHOOK#*://}"
          WEBHOOK_HOST="${WEBHOOK_HOST%%/*}"
          WEBHOOK_HOST_ONLY="${WEBHOOK_HOST%%:*}"
          WEBHOOK_PATH="/${WEBHOOK#*://*/}"
          WEBHOOK_URL="https://${DOKPLOY_HOST}${WEBHOOK_PATH}"
          echo "::add-mask::$WEBHOOK_HOST"
          echo "::add-mask::$WEBHOOK_HOST_ONLY"
          echo "::add-mask::$WEBHOOK_URL"
          DEPLOY_TITLE_PREFIX="Staging docs"
          SHORT_SHA="${GITHUB_SHA::7}"
          SHORT_SHA="${SHORT_SHA:-unknown}"
          SUBJECT="Manual deploy"
          if [ -f "${GITHUB_EVENT_PATH:-}" ]; then
            SUBJECT="$(jq -r '(.head_commit.message // "") | split("\n")[0]' "$GITHUB_EVENT_PATH")"
            SUBJECT="${SUBJECT:-Manual deploy}"
          fi
          DEPLOY_TITLE="${DEPLOY_TITLE_PREFIX}: ${SHORT_SHA} - ${SUBJECT}"
          if [ -f "${GITHUB_EVENT_PATH:-}" ]; then
            PAYLOAD="$(jq -c \
              --arg ref "refs/heads/${GITHUB_REF_NAME:-}" \
              --arg sha "${GITHUB_SHA:-}" \
              --arg title "$DEPLOY_TITLE" \
              '.ref = (.ref // $ref)
              | .head_commit = ((.head_commit // {}) + { id: (.head_commit.id // $sha), message: $title })
              | .commits = (if (.commits | type) == "array" then .commits else [] end)' \
              "$GITHUB_EVENT_PATH")"
          else
            PAYLOAD="$(jq -cn \
              --arg ref "refs/heads/${GITHUB_REF_NAME:-}" \
              --arg sha "${GITHUB_SHA:-}" \
              --arg title "$DEPLOY_TITLE" \
              '{ ref: $ref, head_commit: { id: $sha, message: $title }, commits: [] }')"
          fi
          curl --resolve "$DOKPLOY_HOST:443:$DOKPLOY_TAILNET_IP" --connect-timeout 10 --retry 2 --retry-delay 5 -fsSL -X POST -H "Content-Type: application/json" -H "x-github-event: push" -d "$PAYLOAD" "$WEBHOOK_URL"
