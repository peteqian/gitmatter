name: CI

# Verify gate: format, lint, types, and tests. Runs on PRs into dev/master and is
# reused (workflow_call) by the staging and release pipelines so a deploy never
# ships unverified code.
on:
  pull_request:
    branches: [dev, master]
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    # Core tests hit the database (Drizzle), so spin up pgvector and migrate it
    # before running. S3-backed suites self-skip when S3_ACCESS_KEY is unset.
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: gitmatter
          POSTGRES_PASSWORD: gitmatter
          POSTGRES_DB: gitmatter
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U gitmatter"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://gitmatter:gitmatter@localhost:5432/gitmatter
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      # build → lint → test: fail fast on a broken build before linting, and lint
      # before the (slower, DB-backed) tests.
      - name: Build
        run: bun run build

      - name: Lint (format, lint, types)
        run: bun run check

      - name: Migrate test database
        run: cd packages/db && bun run migrate

      - name: Test
        run: bun run test
