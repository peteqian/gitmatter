name: Release

# main branch → production release. Every merge to main verifies, cuts a
# date-based version tag (vYYYY.MM.DD, .N for same-day repeats), builds+pushes
# the web/docs images to GHCR, then deploys the production VPS apps via Dokploy.
#
# The CLI/self-host compose pulls ghcr.io/<owner>/gitmatter — pin to a version tag
# in production.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # push the version tag
  packages: write # push images to GHCR

# One release at a time, so two quick merges can't race the same version/deploy.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  version:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute CalVer tag and push it
        id: calver
        run: |
          git fetch --tags --quiet
          DATE=$(date -u +v%Y.%m.%d)
          N=$(git tag -l "${DATE}*" | wc -l | tr -d ' ')
          if [ "$N" -eq 0 ]; then VERSION="$DATE"; else VERSION="${DATE}.${N}"; fi
          echo "Release version: $VERSION"
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      # Two flavors of the same source, published as two separate GHCR packages so
      # their visibility differs: `local` (self-host, login-first) → public
      # `gitmatter`; `cloud` (marketing + prerender) → private `gitmatter-cloud`.
      # DEPLOYMENT is baked at build time, so one image can't be both.
      matrix:
        include:
          - deployment: local
          - deployment: cloud
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      # Build the web app into apps/web/dist here (not in the Docker build): the
      # cloud prerender boots the SSR server and crawls it, which needs a real
      # environment. DEPLOYMENT bakes the flavor into dist. The dummy DATABASE_URL
      # only satisfies the db client's import guard — public pages never query it.
      - name: Build web (${{ matrix.deployment }})
        env:
          DEPLOYMENT: ${{ matrix.deployment }}
          # Dummy build-only values: vp build forces NODE_ENV=production, so the
          # prerender server boots the real auth/db modules. DATABASE_URL only
          # satisfies the db client's import guard (public pages never query it);
          # BETTER_AUTH_SECRET only clears better-auth's default-secret check.
          DATABASE_URL: postgres://build:build@127.0.0.1:5432/build
          BETTER_AUTH_SECRET: build-only-not-a-real-secret-000000
          # Public Turnstile site key for gitmatter.com, baked into the client
          # bundle (vite define). Cloud flavor only — self-host builds bake nothing
          # so self-hosters supply their own. Public by design (ships to every
          # browser). The widget must allow gitmatter.com in its hostname list.
          TURNSTILE_SITE_KEY: ${{ matrix.deployment == 'cloud' && '0x4AAAAAADoWezFOHdsCDIF-' || '' }}
        run: cd apps/web && bun run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # local → ghcr.io/<owner>/gitmatter (public); cloud →
          # ghcr.io/<owner>/gitmatter-cloud (private). Both carry bare tags
          # (vDATE, latest); the package name distinguishes the flavor.
          images: ghcr.io/${{ github.repository }}${{ matrix.deployment == 'cloud' && '-cloud' || '' }}
          flavor: |
            latest=true
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SENTRY_RELEASE=${{ needs.version.outputs.version }}
          # Separate cache scope per flavor so the two builds don't clobber each
          # other's layers.
          cache-from: type=gha,scope=${{ matrix.deployment }}
          cache-to: type=gha,mode=max,scope=${{ matrix.deployment }}

  build-docs:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build docs
        run: cd apps/docs && bun run build

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-docs
          flavor: |
            latest=true
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/docs/.next/standalone
          file: infrastructure/Dockerfile.docs
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docs
          cache-to: type=gha,mode=max,scope=docs

  deploy-prod:
    needs: [build, version]
    runs-on: ubuntu-latest
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # Dokploy per-app deploy webhook over the tailnet origin (token in the URL,
      # no api-key). dokploy.gitmatter.com is Cloudflare-fronted and 403s the
      # runner, so we hit the origin directly via Tailscale.
      - name: Trigger production redeploy
        env:
          WEBHOOK: ${{ secrets.PROD_DOKPLOY_WEB_WEBHOOK }}
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "PROD_DOKPLOY_WEB_WEBHOOK unset — skipping deploy."
            exit 0
          fi
          echo "::add-mask::$WEBHOOK"
          WEBHOOK_HOST="${WEBHOOK#*://}"
          WEBHOOK_HOST="${WEBHOOK_HOST%%/*}"
          WEBHOOK_HOST_ONLY="${WEBHOOK_HOST%%:*}"
          echo "::add-mask::$WEBHOOK_HOST"
          echo "::add-mask::$WEBHOOK_HOST_ONLY"
          DEPLOY_TITLE_PREFIX="Production web"
          SHORT_SHA="${GITHUB_SHA::7}"
          SHORT_SHA="${SHORT_SHA:-unknown}"
          SUBJECT="Manual deploy"
          if [ -f "${GITHUB_EVENT_PATH:-}" ]; then
            SUBJECT="$(jq -r '(.head_commit.message // "") | split("\n")[0]' "$GITHUB_EVENT_PATH")"
            SUBJECT="${SUBJECT:-Manual deploy}"
          fi
          VERSION_PART="${RELEASE_VERSION:+$RELEASE_VERSION }"
          DEPLOY_TITLE="${DEPLOY_TITLE_PREFIX}: ${VERSION_PART}${SHORT_SHA} - ${SUBJECT}"
          if [ -f "${GITHUB_EVENT_PATH:-}" ]; then
            PAYLOAD="$(jq -c \
              --arg ref "refs/heads/${GITHUB_REF_NAME:-}" \
              --arg sha "${GITHUB_SHA:-}" \
              --arg title "$DEPLOY_TITLE" \
              '.ref = (.ref // $ref)
              | .head_commit = ((.head_commit // {}) + { id: (.head_commit.id // $sha), message: $title })
              | .commits = (if (.commits | type) == "array" then .commits else [] end)' \
              "$GITHUB_EVENT_PATH")"
          else
            PAYLOAD="$(jq -cn \
              --arg ref "refs/heads/${GITHUB_REF_NAME:-}" \
              --arg sha "${GITHUB_SHA:-}" \
              --arg title "$DEPLOY_TITLE" \
              '{ ref: $ref, head_commit: { id: $sha, message: $title }, commits: [] }')"
          fi
          curl --connect-timeout 10 --retry 2 --retry-delay 5 -fsSL -X POST -H "Content-Type: application/json" -H "x-github-event: push" -d "$PAYLOAD" "$WEBHOOK"

  deploy-prod-docs:
    needs: [build-docs, version]
    runs-on: ubuntu-latest
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Trigger production docs redeploy
        env:
          WEBHOOK: ${{ secrets.PROD_DOKPLOY_DOCS_WEBHOOK }}
          RELEASE_VERSION: ${{ needs.version.outputs.version }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "PROD_DOKPLOY_DOCS_WEBHOOK unset — docs image pushed, skipping redeploy."
            exit 0
          fi
          echo "::add-mask::$WEBHOOK"
          WEBHOOK_HOST="${WEBHOOK#*://}"
          WEBHOOK_HOST="${WEBHOOK_HOST%%/*}"
          WEBHOOK_HOST_ONLY="${WEBHOOK_HOST%%:*}"
          echo "::add-mask::$WEBHOOK_HOST"
          echo "::add-mask::$WEBHOOK_HOST_ONLY"
          DEPLOY_TITLE_PREFIX="Production docs"
          SHORT_SHA="${GITHUB_SHA::7}"
          SHORT_SHA="${SHORT_SHA:-unknown}"
          SUBJECT="Manual deploy"
          if [ -f "${GITHUB_EVENT_PATH:-}" ]; then
            SUBJECT="$(jq -r '(.head_commit.message // "") | split("\n")[0]' "$GITHUB_EVENT_PATH")"
            SUBJECT="${SUBJECT:-Manual deploy}"
          fi
          VERSION_PART="${RELEASE_VERSION:+$RELEASE_VERSION }"
          DEPLOY_TITLE="${DEPLOY_TITLE_PREFIX}: ${VERSION_PART}${SHORT_SHA} - ${SUBJECT}"
          if [ -f "${GITHUB_EVENT_PATH:-}" ]; then
            PAYLOAD="$(jq -c \
              --arg ref "refs/heads/${GITHUB_REF_NAME:-}" \
              --arg sha "${GITHUB_SHA:-}" \
              --arg title "$DEPLOY_TITLE" \
              '.ref = (.ref // $ref)
              | .head_commit = ((.head_commit // {}) + { id: (.head_commit.id // $sha), message: $title })
              | .commits = (if (.commits | type) == "array" then .commits else [] end)' \
              "$GITHUB_EVENT_PATH")"
          else
            PAYLOAD="$(jq -cn \
              --arg ref "refs/heads/${GITHUB_REF_NAME:-}" \
              --arg sha "${GITHUB_SHA:-}" \
              --arg title "$DEPLOY_TITLE" \
              '{ ref: $ref, head_commit: { id: $sha, message: $title }, commits: [] }')"
          fi
          curl --connect-timeout 10 --retry 2 --retry-delay 5 -fsSL -X POST -H "Content-Type: application/json" -H "x-github-event: push" -d "$PAYLOAD" "$WEBHOOK"
