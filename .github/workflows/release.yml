name: Release

# master branch → production release. Every merge to master verifies, cuts a
# date-based version tag (vYYYY.MM.DD, .N for same-day repeats), builds+pushes the
# public (local) and cloud images to GHCR, then deploys the production VPS via its
# redeploy webhook.
#
# The CLI/self-host compose pulls ghcr.io/<owner>/gitcounsel — pin to a version tag
# in production.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write # push the version tag
  packages: write # push images to GHCR

# One release at a time, so two quick merges can't race the same version/deploy.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  version:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute CalVer tag and push it
        id: calver
        run: |
          git fetch --tags --quiet
          DATE=$(date -u +v%Y.%m.%d)
          N=$(git tag -l "${DATE}*" | wc -l | tr -d ' ')
          if [ "$N" -eq 0 ]; then VERSION="$DATE"; else VERSION="${DATE}.${N}"; fi
          echo "Release version: $VERSION"
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      # Two flavors of the same source: `local` (self-host, login-first) keeps the
      # plain tags (latest, vDATE); `cloud` (marketing + prerender) gets a -cloud
      # suffix. DEPLOYMENT is baked at build time, so one image can't be both.
      matrix:
        include:
          - deployment: local
            suffix: ""
          - deployment: cloud
            suffix: "-cloud"
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Cloud flavor appends -cloud to every tag (vDATE-cloud, latest-cloud);
          # local keeps the bare tags (vDATE, latest).
          flavor: |
            latest=true
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/Dockerfile.web
          push: true
          build-args: |
            DEPLOYMENT=${{ matrix.deployment }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Separate cache scope per flavor so the two builds don't clobber each
          # other's layers.
          cache-from: type=gha,scope=${{ matrix.deployment }}
          cache-to: type=gha,mode=max,scope=${{ matrix.deployment }}

  # Auto-deploy the freshly pushed -cloud image to the production VPS by pinging
  # its Coolify/Dokploy redeploy webhook. The platform pulls + restarts; CI only
  # fires the hook. Skips cleanly when the webhook secret is unset (e.g. forks).
  deploy-prod:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production redeploy
        env:
          WEBHOOK: ${{ secrets.PROD_WEBHOOK_URL }}
          TOKEN: ${{ secrets.PROD_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "PROD_WEBHOOK_URL unset — skipping deploy."
            exit 0
          fi
          curl -fsSL -X POST "$WEBHOOK" ${TOKEN:+-H "Authorization: Bearer $TOKEN"}
