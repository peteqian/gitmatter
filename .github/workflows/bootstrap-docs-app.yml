name: Bootstrap docs app

# One-shot helper to create the dokploy docs Application from CI (the runner
# already holds the staging dokploy secrets and reaches the panel over Tailscale,
# so no credential leaves the trusted boundary). Runs only when a dev push commit
# message contains the marker [bootstrap-docs]. Phase 1 just inspects the existing
# project so we can wire the create correctly; it prints ids and image names
# (non-secret) only — never env values or registry passwords.
on:
  push:
    branches: [dev]

jobs:
  bootstrap:
    if: contains(github.event.head_commit.message, '[bootstrap-docs]')
    runs-on: ubuntu-latest
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Inspect dokploy project
        env:
          DOKPLOY_URL: ${{ secrets.STAGING_DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.STAGING_DOKPLOY_API_KEY }}
        run: |
          set -euo pipefail
          P=$(curl -fsSL "$DOKPLOY_URL/api/project.all" -H "x-api-key: $DOKPLOY_API_KEY")
          echo "::group::top-level keys"
          echo "$P" | jq -r 'if type=="array" then "array len="+(length|tostring) else (keys|join(",")) end'
          echo "::endgroup::"
          echo "::group::applications (non-secret fields)"
          # Try the environment-nested shape, then a flat shape. Print only ids,
          # names, image refs, and booleans for whether creds are set.
          echo "$P" | jq -r '
            [ .. | objects | select(has("applicationId")) ]
            | map({name, appName, applicationId, environmentId, serverId,
                   sourceType, dockerImage, registryUrl,
                   hasUser:(.username!=null and .username!=""),
                   hasPass:(.password!=null and .password!="")})
            | .[] | "\(.name)\tapp=\(.appName)\tid=\(.applicationId)\tenv=\(.environmentId)\tsrv=\(.serverId)\tsrc=\(.sourceType)\timg=\(.dockerImage)\treg=\(.registryUrl)\tuser?=\(.hasUser)\tpass?=\(.hasPass)"
          '
          echo "::endgroup::"
