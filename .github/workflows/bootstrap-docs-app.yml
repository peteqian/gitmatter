name: Bootstrap docs app

# One-shot helper to create the dokploy docs Application from CI (the runner
# already holds the staging dokploy secrets and reaches the panel over Tailscale,
# so no credential leaves the trusted boundary). Runs only when a dev push commit
# message contains the marker [bootstrap-docs]. Phase 1 just inspects the existing
# project so we can wire the create correctly; it prints ids and image names
# (non-secret) only — never env values or registry passwords.
on:
  push:
    branches: [dev]

jobs:
  bootstrap:
    if: contains(github.event.head_commit.message, '[bootstrap-docs]')
    runs-on: ubuntu-latest
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Create + deploy docs application
        env:
          DOKPLOY_URL: ${{ secrets.STAGING_DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.STAGING_DOKPLOY_API_KEY }}
          # The staging web app — same environment, same GHCR pull creds. The docs
          # app is created alongside it and reuses those creds (copied server-side,
          # never printed). Discovered via the earlier inspect phase.
          WEB_APP_ID: kv_-YBkv-sJR8o5kYpK2U
          ENVIRONMENT_ID: Nb63sPHAgblblXAhiz2Wn
          DOCS_IMAGE: ghcr.io/${{ github.repository }}-docs:staging
        run: |
          set -euo pipefail
          post() { curl -fsSL -X POST "$DOKPLOY_URL/api$1" -H "x-api-key: $DOKPLOY_API_KEY" -H "Content-Type: application/json" -d "$2"; }
          get()  { curl -fsSL "$DOKPLOY_URL/api$1" -H "x-api-key: $DOKPLOY_API_KEY"; }

          # Idempotent: reuse an existing docs app if a prior run created one.
          P=$(get /project.all)
          APPID=$(echo "$P" | jq -r '[.. | objects | select(.name=="gitmatter-staging-docs")][0].applicationId // empty')
          if [ -z "$APPID" ]; then
            CREATED=$(post /application.create "$(jq -n --arg env "$ENVIRONMENT_ID" '{name:"gitmatter-staging-docs",description:"Standalone docs site, served at /docs",environmentId:$env}')")
            APPID=$(echo "$CREATED" | jq -r '.applicationId')
            echo "created docs app: $APPID"
          else
            echo "reusing existing docs app: $APPID"
          fi
          [ -n "$APPID" ] && [ "$APPID" != "null" ] || { echo "no applicationId"; exit 1; }

          # Copy the staging web app's GHCR pull creds (mask before any use).
          WEB=$(get "/application.one?applicationId=$WEB_APP_ID")
          U=$(echo "$WEB" | jq -r '.username // ""'); echo "::add-mask::$U"
          PW=$(echo "$WEB" | jq -r '.password // ""'); echo "::add-mask::$PW"

          post /application.saveDockerProvider \
            "$(jq -n --arg id "$APPID" --arg img "$DOCS_IMAGE" --arg u "$U" --arg p "$PW" \
                  '{applicationId:$id,dockerImage:$img,username:$u,password:$p,registryUrl:"ghcr.io"}')" >/dev/null
          echo "docker provider set -> $DOCS_IMAGE"

          # Route staging.gitmatter.com/docs to this app on its 4285 port. A path
          # prefix is more specific than the web app's host-only "/" rule, so
          # Traefik prefers it. stripPath:false keeps /docs (the app's basePath).
          if ! echo "$P" | jq -e --arg id "$APPID" '[.. | objects | select(.applicationId==$id) | .domains? // empty | .[]? | select(.path=="/docs")] | length>0' >/dev/null 2>&1; then
            post /domain.create \
              "$(jq -n --arg id "$APPID" \
                    '{applicationId:$id,host:"staging.gitmatter.com",path:"/docs",port:4285,https:true,certificateType:"letsencrypt",stripPath:false,domainType:"application"}')" >/dev/null || echo "domain.create skipped (may already exist)"
          fi
          echo "domain ensured -> staging.gitmatter.com/docs:4285"

          post /application.deploy "$(jq -n --arg id "$APPID" '{applicationId:$id}')" >/dev/null
          echo "deploy triggered"
          echo "::notice title=Docs app id::$APPID"
          echo "DOCS_APP_ID=$APPID"
